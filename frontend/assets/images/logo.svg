<svg viewBox="0 0 180 165" xmlns="http://www.w3.org/2000/svg">

  <!-- ===== BANKNOTE STACK ===== -->

  <!-- Back bill — deep black, steepest angle -->
  <g transform="rotate(-22, 52, 68)">
    <rect x="12" y="46" width="56" height="36" rx="5" fill="#0a0a0a"/>
  </g>

  <!-- Middle bill — charcoal, moderate angle -->
  <g transform="rotate(-11, 52, 66)">
    <rect x="10" y="43" width="58" height="36" rx="5" fill="#2c2c2c"/>
    <!-- subtle line detail -->
    <rect x="16" y="49" width="22" height="2" rx="1" fill="#444"/>
    <rect x="16" y="68" width="16" height="2" rx="1" fill="#444"/>
  </g>

  <!-- Top bill — vibrant green, flat -->
  <rect x="8" y="39" width="62" height="38" rx="5" fill="#27A827"/>
  <!-- oval highlight -->
  <ellipse cx="39" cy="58" rx="12" ry="10" fill="rgba(255,255,255,0.12)"/>
  <!-- dollar sign -->
  <text x="39" y="64"
        font-size="22" font-weight="900"
        font-family="Arial Black, Arial, sans-serif"
        fill="white" text-anchor="middle">$</text>
  <!-- detail lines on green bill -->
  <rect x="56" y="46" width="8" height="2" rx="1" fill="rgba(255,255,255,0.3)"/>
  <rect x="56" y="50" width="8" height="2" rx="1" fill="rgba(255,255,255,0.3)"/>
  <rect x="56" y="68" width="8" height="2" rx="1" fill="rgba(255,255,255,0.3)"/>
  <rect x="56" y="72" width="8" height="2" rx="1" fill="rgba(255,255,255,0.3)"/>

  <!-- ===== HUMAN SILHOUETTE ===== -->

  <!-- Head -->
  <circle cx="132" cy="23" r="13" fill="#0d0d0d"/>

  <!-- Neck + upper body (shield-like torso) -->
  <path d="M 118 62
           C 113 50 115 38 132 34
           C 149 38 151 50 146 62
           Z"
        fill="#0d0d0d"/>

  <!-- Left arm — sweeping up-left -->
  <path d="M 120 55 Q 104 42 94 26"
        stroke="#0d0d0d" stroke-width="11"
        stroke-linecap="round" fill="none"/>

  <!-- Right arm — sweeping up-right -->
  <path d="M 144 55 Q 160 42 162 26"
        stroke="#0d0d0d" stroke-width="11"
        stroke-linecap="round" fill="none"/>

  <!-- ===== WORDMARK ===== -->

  <!-- "Expense" — heavy black -->
  <text x="90" y="116"
        font-size="34" font-weight="900"
        font-family="Arial Black, Arial, sans-serif"
        fill="#0d0d0d" text-anchor="middle"
        letter-spacing="-0.5">Expense</text>

  <!-- "TRACKER" — small caps green -->
  <text x="90" y="136"
        font-size="13" font-weight="700"
        font-family="Arial, sans-serif"
        fill="#27A827" text-anchor="middle"
        letter-spacing="5">TRACKER</text>

</svg>
