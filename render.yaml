# Render Blueprint for BudgetWise — one web service (Flask serves the API and the
# frontend) plus a free PostgreSQL database. Deploy via Render > New > Blueprint.
services:
  - type: web
    name: budgetwise
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true          # Render generates a strong secret
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ADMIN_EMAIL
        value: ezomonbright9@gmail.com
      - key: ADMIN_NAME
        value: System Administrator
      - key: ADMIN_PASSWORD
        sync: false                  # you set this yourself in the dashboard (secret)
      - key: DATABASE_URL
        fromDatabase:
          name: budgetwise-db
          property: connectionString

databases:
  - name: budgetwise-db
    plan: free
